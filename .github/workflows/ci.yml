# .github/workflows/ci.yml
name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ─── Lint + Type Check ───────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm run type-check

      - name: Validate OpenAPI contract
        run: pnpm run openapi:check

      - name: Check formatting
        run: pnpm run format:check
        continue-on-error: true

  # ─── Tests ──────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm run test -- --run
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          AUTH_SECRET: "test-secret-32-chars-minimum-here"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          GOVT_PRIMARY_MODE: "true"
          NEXT_PUBLIC_GOVT_PRIMARY_MODE: "true"

  # ─── Build ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/build"

      - name: Build Next.js app
        # Use webpack in CI until Turbopack build stability is consistent across runners.
        run: pnpm exec next build --webpack
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/build"
          AUTH_SECRET: "build-secret-32-chars-minimum-here"
          NEXT_PUBLIC_APP_URL: "https://app.bd-gps.com"
          GOVT_PRIMARY_MODE: "true"
          NEXT_PUBLIC_GOVT_PRIMARY_MODE: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1


  # ─── E2E Smoke (guarded) ──────────────────────
  e2e_smoke:
    name: E2E Smoke (Login + BN Dashboard)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare e2e database schema and seed
        run: |
          pnpm exec prisma db push
          pnpm exec prisma db seed
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/e2e"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/e2e"
          AUTH_SECRET: "playwright-secret-32-chars-minimum"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3100"
          GOVT_PRIMARY_MODE: "true"
          NEXT_PUBLIC_GOVT_PRIMARY_MODE: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Check smoke credential availability
        id: smoke_creds
        run: |
          if [ -n "${E2E_ADMIN_EMAIL}" ] && [ -n "${E2E_ADMIN_PASSWORD}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD not set. Skipping e2e smoke job steps."
          fi
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Install Playwright browser (Chromium)
        if: steps.smoke_creds.outputs.enabled == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run BN dashboard smoke test
        if: steps.smoke_creds.outputs.enabled == 'true'
        run: pnpm run test:e2e -- tests/e2e/dashboard/bn-dashboard-smoke.spec.ts
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/e2e"
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_SCHOOL_CODE: ${{ secrets.E2E_ADMIN_SCHOOL_CODE }}
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3100"
          AUTH_SECRET: "playwright-secret-32-chars-minimum"
          GOVT_PRIMARY_MODE: "true"
          NEXT_PUBLIC_GOVT_PRIMARY_MODE: "true"

  # ─── Docker Build & Push ────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Normalize container image names
        id: vars
        run: |
          REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          APP_NAME="$(basename "${REPO_LOWER}")"
          DOCKERHUB_IMAGE_INPUT="$(echo "${DOCKERHUB_IMAGE}" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
            if [ -n "${DOCKERHUB_IMAGE_INPUT}" ]; then
              case "${DOCKERHUB_IMAGE_INPUT}" in
                */*)
                  DOCKERHUB_IMAGE_RESOLVED="${DOCKERHUB_IMAGE_INPUT}"
                  ;;
                *)
                  DOCKERHUB_IMAGE_RESOLVED="${DOCKERHUB_USERNAME}/${DOCKERHUB_IMAGE_INPUT}"
                  ;;
              esac
            else
              DOCKERHUB_IMAGE_RESOLVED="${DOCKERHUB_USERNAME}/${APP_NAME}"
            fi
            echo "dockerhub_image=${DOCKERHUB_IMAGE_RESOLVED}" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE || vars.DOCKERHUB_IMAGE }}

      - name: Docker Hub config presence check
        run: |
          [ -n "${DOCKERHUB_USERNAME}" ] && echo "::notice::DOCKERHUB_USERNAME detected" || echo "::warning::DOCKERHUB_USERNAME missing"
          [ -n "${DOCKERHUB_TOKEN}" ] && echo "::notice::DOCKERHUB_TOKEN detected" || echo "::warning::DOCKERHUB_TOKEN missing"
          [ -n "${DOCKERHUB_IMAGE}" ] && echo "::notice::DOCKERHUB_IMAGE override detected" || echo "::notice::DOCKERHUB_IMAGE not set (using repo name fallback)"
          echo "::notice::resolved dockerhub image: ${{ steps.vars.outputs.dockerhub_image }}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE || vars.DOCKERHUB_IMAGE }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.vars.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}

      - name: Docker Hub credentials missing (skip Docker Hub push)
        if: steps.vars.outputs.dockerhub_enabled != 'true'
        run: echo "::notice::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not found. Skipping Docker Hub push."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.ghcr_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/build
            AUTH_SECRET=build-secret-32-chars-minimum-here
            NEXT_PUBLIC_APP_URL=https://app.bd-gps.com
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Docker Hub)
        if: steps.vars.outputs.dockerhub_enabled == 'true'
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.dockerhub_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (Docker Hub)
        if: steps.vars.outputs.dockerhub_enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/build
            AUTH_SECRET=build-secret-32-chars-minimum-here
            NEXT_PUBLIC_APP_URL=https://app.bd-gps.com
          push: true
          tags: ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_dockerhub.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Vercel ───────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Vercel secret availability
        id: vercel
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID missing. Skipping deploy step."
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: steps.vercel.outputs.enabled == 'true'
        run: |
          pnpm dlx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
